<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnAI BD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkSession()">
    <div id="auth-container">
        <div class="auth-card">
            <h1 style="font-size: 32px; margin-bottom: 10px;">LearnAI BD</h1>
            <p style="color: #555;">আপনার ব্যক্তিগত এআই শিক্ষক</p>
            <div id="reg-fields">
                <input type="email" id="reg-email" placeholder="markaza736@gmail.com">
                <input type="tel" id="reg-phone" placeholder="01732561242">
                <input type="password" placeholder="......">
                <button class="btn-main" onclick="sendOTP()">অ্যাকাউন্ট তৈরি করুন 🚀</button>
            </div>
            <div id="otp-fields" class="hidden">
                <div id="otp-display" style="padding:15px; background:#f0f0f0; border-radius:10px; margin-bottom:10px; font-weight:bold; color:#0062ff;"></div>
                <input type="text" id="otp-input" placeholder="৪ সংখ্যার কোড দিন">
                <button class="btn-main" onclick="verifyAndSignup()">ভেরিফাই ও সাইনআপ ✅</button>
            </div>
        </div>
    </div>

    <div id="app-container" class="hidden" style="text-align:center; padding-top:50px;">
        <h2>অভিনন্দন! আপনি সফলভাবে লগইন করেছেন।</h2>
        <button onclick="logout()" class="btn-main" style="width:200px;">লগ আউট</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
