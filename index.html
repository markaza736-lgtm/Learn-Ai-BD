<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnAI BD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkSession()">
    <div id="auth-container">
        <div class="auth-card">
            <h1>LearnAI BD</h1>
            <p>আপনার ব্যক্তিগত এআই শিক্ষক</p>
            <div id="reg-fields">
                <input type="email" id="reg-email" placeholder="ইমেইল দিন">
                <input type="tel" id="reg-phone" placeholder="ফোন নম্বর দিন">
                <button class="btn-main" onclick="sendOTP()">অ্যাকাউন্ট তৈরি করুন 🚀</button>
            </div>
            <div id="otp-fields" class="hidden">
                <div id="otp-display" style="padding:15px; background:#e3f2fd; border-radius:10px; margin-bottom:10px; font-weight:bold; color:#1976d2; border: 1px solid #bbdefb;"></div>
                <input type="number" id="otp-input" placeholder="৪ সংখ্যার কোড দিন">
                <button class="btn-main" onclick="verifyAndSignup()">ভেরিফাই ও সাইনআপ ✅</button>
            </div>
        </div>
    </div>
    <div id="app-container" class="hidden" style="text-align:center; padding-top:50px;">
        <h2 id="welcome-msg"></h2>
        <button onclick="logout()" class="btn-main" style="width:200px; margin-top:20px;">লগ আউট</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
