<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnAI BD</title>
    <link rel="stylesheet" href="style.css">
</head>
<body onload="checkSession()">
    <div id="auth-container">
        <div class="auth-card">
            <h1>LearnAI BD</h1>
            <p>আপনার ব্যক্তিগত এআই শিক্ষক</p>
            <div id="reg-fields">
                <input type="email" id="reg-email" placeholder="markaza736@gmail.com">
                <input type="tel" id="reg-phone" placeholder="01732561242">
                <input type="password" id="reg-pass" placeholder="......">
                <button class="btn-main" onclick="sendOTP()">অ্যাকাউন্ট তৈরি করুন 🚀</button>
            </div>
            <div id="otp-fields" class="hidden">
                <p id="otp-display" style="background:#eee; padding:10px; border-radius:10px;"></p>
                <input type="text" id="otp-input" placeholder="কোডটি এখানে দিন">
                <button class="btn-main" onclick="verifyAndSignup()">ভেরিফাই করুন ✅</button>
            </div>
        </div>
    </div>
    <div id="app-container" class="hidden">
        <h2 style="text-align:center; padding:20px;">স্বাগতম! আপনি লগইন করেছেন।</h2>
        <button onclick="logout()" style="display:block; margin: 0 auto;">লগ আউট</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
